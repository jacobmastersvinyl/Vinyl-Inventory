<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Item Logger</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    input, textarea, button {
      width: 100%;
      margin: 8px 0;
      padding: 10px;
      font-size: 16px;
    }
    .status { margin-top: 10px; }
  </style>
</head>
<body>

<h2>Log Item</h2>

<input id="id" placeholder="ID" />
<input id="name" placeholder="Name" />
<input id="category" placeholder="Category" />
<textarea id="description" placeholder="Description"></textarea>

<input id="photos" type="file" accept="image/*" multiple />

<button onclick="save()">Save</button>

<div class="status" id="status"></div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwxhZiH_yrNp7oTWSht6qu7y5sWkKXnMTVAQyEXklnYXEbMQgYhacfhKU4ipJQ-rY6g8g/exec";

let queue = JSON.parse(localStorage.getItem('queue') || '[]');

function setStatus(msg) {
  document.getElementById('status').innerText = msg;
}

// compress image
function compress(file) {
  return new Promise(resolve => {
    const img = new Image();
    const reader = new FileReader();

    reader.onload = e => {
      img.src = e.target.result;
    };

    img.onload = () => {
      const canvas = document.createElement('canvas');
      const max = 800;
      let w = img.width;
      let h = img.height;

      if (w > h && w > max) {
        h *= max / w;
        w = max;
      } else if (h > max) {
        w *= max / h;
        h = max;
      }

      canvas.width = w;
      canvas.height = h;

      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);

      resolve(canvas.toDataURL('image/jpeg', 0.6));
    };

    reader.readAsDataURL(file);
  });
}

async function getPhotos() {
  const files = document.getElementById('photos').files;
  const arr = [];

  for (let f of files) {
    const c = await compress(f);
    arr.push(c);
  }

  return arr;
}

async function save() {
  const item = {
    id: document.getElementById('id').value.trim(),
    name: document.getElementById('name').value.trim(),
    category: document.getElementById('category').value.trim(),
    description: document.getElementById('description').value.trim(),
    photos: await getPhotos()
  };

  if (!item.id) {
    setStatus("ID required");
    return;
  }

  queue.push(item);
  localStorage.setItem('queue', JSON.stringify(queue));

  setStatus("Saved locally");

  sync();
}

// retry upload
async function sync() {
  if (!navigator.onLine) {
    setStatus("Offline — waiting");
    return;
  }

  for (let i = 0; i < queue.length; i++) {
    try {
      const res = await fetch(API_URL, {
        method: "POST",
        body: JSON.stringify(queue[i])
      });

      const json = await res.json();

      if (json.success) {
        queue.splice(i, 1);
        i--;
        setStatus("Synced");
      } else {
        setStatus("Error syncing");
        break;
      }

    } catch (e) {
      setStatus("Connection failed");
      break;
    }
  }

  localStorage.setItem('queue', JSON.stringify(queue));
}

// auto retry every 15s
setInterval(sync, 15000);

</script>

</body>
</html>
